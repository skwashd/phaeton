name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.component }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - workflow-analyzer
          - n8n-to-sfn
          - packager
          - n8n-release-parser
          - shared/phaeton-models
          - deployment
          - ai-agent
    defaults:
      run:
        working-directory: ${{ matrix.component }}
    steps:
      - name: Checkout Code
        id: checkout
        uses: actions/checkout@v6

      - name: Compute Artifact Name
        id: compute-artifact-name
        run: echo "artifact_name=${COMPONENT//\//-}" >> "$GITHUB_OUTPUT"
        env:
          COMPONENT: ${{ matrix.component }}
        working-directory: .

      - name: Set Up Uv
        id: setup-uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install Dependencies
        id: install-deps
        run: uv sync --dev

      - name: Lint With Ruff
        id: lint
        run: uv run ruff check

      - name: Type Check With Ty
        id: type-check
        run: uv run ty check

      - name: Run Tests With Coverage
        id: test
        run: |
          uv run coverage run -m pytest
          uv run coverage report
          uv run coverage xml -o coverage.xml

      - name: Upload Coverage Report
        id: upload-coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ steps.compute-artifact-name.outputs.artifact_name }}
          path: ${{ matrix.component }}/coverage.xml
          retention-days: 14

      - name: Upload Test Results
        id: upload-test-results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ steps.compute-artifact-name.outputs.artifact_name }}
          path: ${{ matrix.component }}/.pytest_cache/v/cache/lastfailed
          retention-days: 14
